name: Deploy to VPS
#test it works
on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: BRANCH_NAME
          script: |
            set -e
            if [ "$BRANCH_NAME" = "main" ]; then
              cd /var/www/umrah-prod
              rm -rf dist/
              git pull origin main
              npm install
              npm run build
              pm2 restart umrah-prod || pm2 start npm --name umrah-prod -- start
            else
              cd /var/www/umrah-staging
              rm -rf dist/
              git pull origin staging
              npm install
              npm run build
              pm2 restart umrah-staging || pm2 start npm --name umrah-staging -- start
            fi
        env:
          BRANCH_NAME: ${{ github.ref_name }}

