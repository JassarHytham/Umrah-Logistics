name: Deploy to VPS

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: BRANCH_NAME
          script: |
            set -e

            migrate_existing_db() {
              DB_DIR="$1"
              mkdir -p "$DB_DIR"

              if [ ! -e "$DB_DIR/umrah.db" ] && [ -e "umrah.db" ]; then
                for file in umrah.db umrah.db-wal umrah.db-shm; do
                  if [ -e "$file" ]; then
                    mv "$file" "$DB_DIR/$file"
                  fi
                done
              fi
            }

            deploy_app() {
              APP_DIR="$1"
              BRANCH="$2"
              APP_NAME="$3"
              APP_DB_PATH="$4"
              APP_DB_DIR="$(dirname "$APP_DB_PATH")"

              cd "$APP_DIR"
              pm2 stop "$APP_NAME" || true
              migrate_existing_db "$APP_DB_DIR"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
              rm -rf dist/
              rm -rf node_modules
              npm ci
              npm run build
              DB_PATH="$APP_DB_PATH" pm2 restart "$APP_NAME" --update-env || DB_PATH="$APP_DB_PATH" pm2 start npm --name "$APP_NAME" -- start
            }

            install_backup_cron() {
              NODE_BIN="$(command -v node)"
              cat >/etc/cron.d/umrah-db-backup <<EOF
SHELL=/bin/bash
PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/bin
0 * * * * root cd /var/www/umrah-prod && ${NODE_BIN} scripts/db-backup.mjs backup --db /var/lib/umrah/prod/umrah.db --dir /var/backups/umrah/prod --keep 168 >> /var/log/umrah-db-backup.log 2>&1
0 * * * * root cd /var/www/umrah-staging && ${NODE_BIN} scripts/db-backup.mjs backup --db /var/lib/umrah/staging/umrah.db --dir /var/backups/umrah/staging --keep 168 >> /var/log/umrah-db-backup.log 2>&1
EOF
            }

            run_backup_tasks() {
              APP_DIR="$1"
              DB_PATH_TO_BACKUP="$2"
              BACKUP_DIR="$3"

              if [ "$(id -u)" -ne 0 ]; then
                echo "Skipping backup setup: deploy user is not root."
                return 0
              fi

              NODE_BIN="$(command -v node)"
              install_backup_cron
              cd "$APP_DIR"
              "$NODE_BIN" scripts/db-backup.mjs backup --db "$DB_PATH_TO_BACKUP" --dir "$BACKUP_DIR" --keep 168
            }

            if [ "$BRANCH_NAME" = "main" ]; then
              deploy_app /var/www/umrah-prod main umrah-prod /var/lib/umrah/prod/umrah.db
              run_backup_tasks /var/www/umrah-prod /var/lib/umrah/prod/umrah.db /var/backups/umrah/prod
            else
              deploy_app /var/www/umrah-staging staging umrah-staging /var/lib/umrah/staging/umrah.db
              run_backup_tasks /var/www/umrah-staging /var/lib/umrah/staging/umrah.db /var/backups/umrah/staging
            fi
        env:
          BRANCH_NAME: ${{ github.ref_name }}
